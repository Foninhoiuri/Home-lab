version: '3.8'

services:
  # ==========================================
  # 1. BANCO DE DADOS POSTGRES
  # ==========================================
  postgres-evo:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=evogo_auth
    volumes:
      - evo_db_data:/var/lib/postgresql/data
    networks:
      - evolution_internal
    deploy:
      mode: replicated
      endpoint_mode: dnsrr
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

  # ==========================================
  # 2. REDIS (Cache de Alta Performance)
  # ==========================================
  redis-evo:
    image: redis:7-alpine
    networks:
      - evolution_internal
    deploy:
      mode: replicated
      endpoint_mode: dnsrr
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

  # ==========================================
  # 3. EVOLUTION API GO
  # ==========================================
  evolution-api:
    image: evoapicloud/evolution-go:0.7.1
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
    environment:
      # --- Configurações de Servidor ---
      - SERVER_PORT=8080
      - CLIENT_NAME=evolution
      - GLOBAL_API_KEY=sua-chave-secura-aqui
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=sua-chave-secura-aqui
      - TZ=America/Sao_Paulo
      
      # --- Banco de Dados ---
      - POSTGRES_AUTH_DB=postgresql://postgres:password@postgres-evo:5432/evogo_auth?sslmode=disable
      - POSTGRES_USERS_DB=postgresql://postgres:password@postgres-evo:5432/evogo_auth?sslmode=disable
      - DATABASE_SAVE_MESSAGES=false
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_DATA_CONTACTS=true

      # --- Redis (REATIVADO) ---
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis-evo:6379/1
      - WEBSOCKET_REDIS_ENABLED=true
      - WEBSOCKET_REDIS_URI=redis://redis-evo:6379/1

      # --- Logs e Webhooks ---
      - WADEBUG=INFO
      - LOGTYPE=console
      - WEBHOOK_GLOBAL_ENABLED=false
      - WEBHOOK_EVENTS_ENABLED=false
      
    volumes:
      - evo_instances_data:/evolution/instances
    networks:
      - evolution_internal
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 10s

volumes:
  evo_db_data:
  evo_instances_data:

networks:
  evolution_internal:
    driver: overlay