version: '3.8'

services:
  # ==========================================
  # 1. BANCO DE DADOS POSTGRESQL
  # ==========================================
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=n8n_user
      - POSTGRES_PASSWORD=sua_senha_segura
      - POSTGRES_DB=n8n_database
    volumes:
      - n8n_db_data:/var/lib/postgresql/data
    networks:
      - n8n_internal
    deploy:
      mode: replicated
      # REMOVIDO: endpoint_mode: dnsrr (Usa o VIP padrão do Swarm, que é mais rápido para achar o DB internamente)
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

  # ==========================================
  # 2. REDIS (O Mensageiro da Fila)
  # ==========================================
  redis:
    image: redis:7-alpine
    networks:
      - n8n_internal
    deploy:
      mode: replicated
      # REMOVIDO: endpoint_mode: dnsrr (Mesmo motivo do Postgres)
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

  # ==========================================
  # 3. N8N MAIN (Interface e Webhooks)
  # ==========================================
  n8n:
    image: docker.n8n.io/n8nio/n8n:2.18.5
    # REMOVIDO: Bloco dns: [1.1.1.1] para que ele volte a usar o DNS interno do Docker e encontre o Postgres.
    ports:
      - target: 5678
        published: 5678
        protocol: tcp
        mode: host
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_database
      - DB_POSTGRESDB_USER=n8n_user
      - DB_POSTGRESDB_PASSWORD=sua_senha_segura
      
      - N8N_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      
      - N8N_ENCRYPTION_KEY=defina_uma_chave_aleatoria_aqui
      
      # SILENCIA OS ERROS DE REDE DO ADGUARD
      - N8N_METRICS_ENABLED=false
      - N8N_DIAGNOSTICS_ENABLED=false
      
    networks:
      - n8n_internal
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 10s

  # ==========================================
  # 4. N8N WORKER (O Executor de Tarefas)
  # ==========================================
  n8n-worker:
    image: docker.n8n.io/n8nio/n8n:2.18.5
    command: worker
    # REMOVIDO: Bloco dns: [1.1.1.1]
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_database
      - DB_POSTGRESDB_USER=n8n_user
      - DB_POSTGRESDB_PASSWORD=sua_senha_segura
      
      - N8N_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      
      - N8N_ENCRYPTION_KEY=defina_uma_chave_aleatoria_aqui
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*

      - N8N_METRICS_ENABLED=false
      - N8N_DIAGNOSTICS_ENABLED=false
    networks:
      - n8n_internal
    deploy:
      mode: replicated
      replicas: 1 
      restart_policy:
        condition: any
        delay: 10s

volumes:
  n8n_db_data:

networks:
  n8n_internal:
    driver: overlay