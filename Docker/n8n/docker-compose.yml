version: '3.8'

services:
  # ==========================================
  # 1. BANCO DE DADOS POSTGRESQL
  # ==========================================
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=n8n_user
      - POSTGRES_PASSWORD=sua_senha_segura
      - POSTGRES_DB=n8n_database
    volumes:
      - n8n_db_data:/var/lib/postgresql/data
    networks:
      - n8n_internal
    deploy:
      mode: replicated
      endpoint_mode: dnsrr
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

  # ==========================================
  # 2. REDIS (O Mensageiro da Fila)
  # ==========================================
  redis:
    image: redis:7-alpine
    networks:
      - n8n_internal
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

  # ==========================================
  # 3. N8N MAIN (Interface e Webhooks)
  # ==========================================
  n8n:
    image: docker.n8n.io/n8nio/n8n:2.17.7
    ports:
      - target: 5678
        published: 5678
        protocol: tcp
        mode: host
    environment:
      # --- Banco de Dados ---
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_database
      - DB_POSTGRESDB_USER=n8n_user
      - DB_POSTGRESDB_PASSWORD=sua_senha_segura
      
      # --- Modo Fila (Queue Mode) ---
      - N8N_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      
      # --- Segurança e Permissões ---
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false # Resolve o erro da URL insegura
      - NODE_FUNCTION_ALLOW_BUILTIN=* # Libera bibliotecas JS
      - NODE_FUNCTION_ALLOW_EXTERNAL=* # Libera pacotes externos
      
      # IMPORTANTE: A Encryption Key deve ser IGUAL no Main e no Worker
      - N8N_ENCRYPTION_KEY=defina_uma_chave_aleatoria_aqui
      
    networks:
      - n8n_internal
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 10s

  # ==========================================
  # 4. N8N WORKER (O Executor de Tarefas)
  # ==========================================
  n8n-worker:
    image: docker.n8n.io/n8nio/n8n:2.17.7
    command: worker # Comando que transforma o n8n em um operário
    environment:
      # Repetir as configurações do Main para que o Worker saiba onde se conectar
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_database
      - DB_POSTGRESDB_USER=n8n_user
      - DB_POSTGRESDB_PASSWORD=sua_senha_segura
      
      - N8N_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      
      - N8N_ENCRYPTION_KEY=defina_uma_chave_aleatoria_aqui # IGUAL ao Main
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
    networks:
      - n8n_internal
    deploy:
      mode: replicated
      # No futuro, você pode aumentar para 2 ou 3 para ter mais poder de fogo
      replicas: 1 
      restart_policy:
        condition: any
        delay: 10s

# ==========================================
# 3. RECURSOS
# ==========================================
volumes:
  n8n_db_data:

networks:
  n8n_internal:
    driver: overlay