version: '3.8'
services:

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=n8n_user
      - POSTGRES_PASSWORD=sua_senha_segura
      - POSTGRES_DB=n8n_database
    volumes:
      - n8n_db_data:/var/lib/postgresql/data
    networks:
      - n8n_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n_user -d n8n_database"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      mode: replicated
      replicas: 1
      endpoint_mode: dnsrr      # <-- ISSO ELIMINA O VIP
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

  redis:
    image: redis:7-alpine
    networks:
      - n8n_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      mode: replicated
      replicas: 1
      endpoint_mode: dnsrr      # <-- MESMO AQUI
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.18.5
    ports:
      - target: 5678
        published: 5678
        protocol: tcp
        mode: host
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_database
      - DB_POSTGRESDB_USER=n8n_user
      - DB_POSTGRESDB_PASSWORD=sua_senha_segura
      - N8N_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - N8N_ENCRYPTION_KEY=defina_uma_chave_aleatoria_aqui
      - N8N_METRICS_ENABLED=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_HOST=0.0.0.0
    networks:
      - n8n_internal
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 15s
        max_attempts: 10
        window: 120s

  n8n-worker:
    image: docker.n8n.io/n8nio/n8n:2.18.5
    command: worker
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_database
      - DB_POSTGRESDB_USER=n8n_user
      - DB_POSTGRESDB_PASSWORD=sua_senha_segura
      - N8N_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - N8N_ENCRYPTION_KEY=defina_uma_chave_aleatoria_aqui
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - N8N_METRICS_ENABLED=false
      - N8N_DIAGNOSTICS_ENABLED=false
    networks:
      - n8n_internal
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 15s
        max_attempts: 10
        window: 120s

volumes:
  n8n_db_data:

networks:
  n8n_internal:
    driver: overlay
    attachable: true